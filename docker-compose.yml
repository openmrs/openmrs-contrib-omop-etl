version: '3.8'

services:
  # dbname: openmrs username: openmrs pw: openmrs rootpw: openmrs
  omrsdb:
    image: openmrs/openmrs-reference-application-3-db:nightly-with-data
    ports:
      - "3306:3306"
    healthcheck:
      # Reports healthy only once the seed OpenMRS schema has loaded. core's
      # SQLmesh plan reads from openmrs.person/obs/encounter/etc., so we need
      # to wait for those tables, not just for mysqld accepting connections.
      test: ["CMD-SHELL", "mysql -uroot -popenmrs openmrs -e 'SELECT 1 FROM person LIMIT 1' >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
  sqlmesh-db:
    image: mariadb:10.11.7
    restart: "unless-stopped"
    command: "mysqld --character-set-server=utf8mb4 --collation-server=utf8mb4_general_ci"
    environment:
      MYSQL_DATABASE: openmrs
      MYSQL_USER: openmrs
      MYSQL_PASSWORD: openmrs
      MYSQL_ROOT_PASSWORD: openmrs
    volumes:
      - db-data:/var/lib/mysql
    ports:
      - "3307:3306"

  core:
    build: core
    image: omop-etl-core
    container_name: core
    environment:
      SRC_HOST: omrsdb
      SRC_PORT: 3306
      SRC_USER: openmrs
      SRC_PASS: openmrs
      SRC_DB: openmrs
      SQLMESH_DB_ROOT_PASSWORD: openmrs
      TARGET_HOST: omop-db
      TARGET_PORT: 5432
      TARGET_USER: omop
      TARGET_PASS: omop
      TARGET_DB: omop
      ACHILLES_VOCAB_SCHEMA: vocab
      ACHILLES_RESULTS_SCHEMA: results
    depends_on:
      sqlmesh-db:
        condition: service_started
      omrsdb:
        condition: service_healthy   # MySQL seed data must be loaded before core reads from openmrs.*
      omop-db:
        condition: service_started
    # Default command when invoked via `depends_on` (e.g. by atlas). Runs the
    # clone step (dumps omrsdb -> sqlmesh-db) BEFORE the pipeline — SQLmesh
    # reads from sqlmesh-db, not omrsdb directly, so the dump is mandatory.
    # `|| true` on the pipeline keeps the auto-chain unblocked when the
    # pre-existing populate-cdm-source step fails because public.concept is
    # empty (vocabulary import is a separate user step — see README).
    # Still overridable for one-off subcommands: `docker compose run core <cmd>`.
    entrypoint: ["/bin/bash", "-c"]
    command:
      - "/core/entrypoint.sh clone-openmrs-db && (/core/entrypoint.sh run-full-pipeline || echo 'WARN: pipeline exited non-zero (likely populate-cdm-source FK on empty concept table). CDM data tables ARE populated; only metadata row is missing.')"

    volumes:
       - ./concepts:/concepts
      # Uncomment the following line during development to mount local files and see changes without rebuilding the image.
      # Note: This will override files copied into /core during build.
      # - so be sure your local files are complete.
       - ./core:/core
    profiles:
      - manual

  omop-db:
    image: postgres:15
    container_name: omop-db
    restart: always
    environment:
      POSTGRES_DB: omop
      POSTGRES_USER: omop
      POSTGRES_PASSWORD: omop
    ports:
      - "5432:5432"
#    volumes:
#      - ./omop-ddl/processed/ddl:/docker-entrypoint-initdb.d
  achilles:
    build: achilles
    image: omop-etl-achilles
    container_name: achilles
    platform: linux/amd64
    depends_on:
      omop-db:
        condition: service_started
      core:
        condition: service_completed_successfully
    environment:
      ACHILLES_DB_URI: "postgresql://omop-db:5432/omop"
      ACHILLES_DB_USERNAME: "omop"
      ACHILLES_DB_PASSWORD: "omop"
      ACHILLES_CDM_SCHEMA: "public"
      ACHILLES_VOCAB_SCHEMA: "public"
      ACHILLES_RESULTS_SCHEMA: "public"
      ACHILLES_CDM_VERSION: "5.4"
    profiles:
      - manual

  dqd:
    build: dqd
    image: omop-etl-dqd
    container_name: omop-etl-dqd
    depends_on:
      - omop-db
    platform: "linux/amd64"
    ports:
      - "3000:3000"
#    secrets:
#      - CDM_CONNECTIONDETAILS_PASSWORD
    environment:
      CDM_CONNECTIONDETAILS_DBMS: "postgresql"
      CDM_CONNECTIONDETAILS_USER: "omop"
      CDM_CONNECTIONDETAILS_SERVER: "omop-db/omop"
      CDM_CONNECTIONDETAILS_PORT: "5432"
      CDM_CONNECTIONDETAILS_PASSWORD: "omop"
      CDM_CONNECTIONDETAILS_EXTRA_SETTINGS: ""
      CDM_VERSION: "5.4"
      CDM_SOURCE_NAME: "OpenMRS"
      CDM_DATABASE_SCHEMA: "public"
      RESULTS_DATABASE_SCHEMA: "public"
      VOCAB_DATABASE_SCHEMA: "public"
      DQD_NUM_THREADS: "2"
      DQD_SQL_ONLY: "FALSE"
      DQD_SQL_ONLY_UNION_COUNT: "1"
      DQD_SQL_ONLY_INCREMENTAL_INSERT: "FALSE"
      DQD_VERBOSE_MODE: "FALSE"
      DQD_WRITE_TO_TABLE: "TRUE"
      DQD_WRITE_TABLE_NAME: "dqdashboard_results"
      DQD_WRITE_TO_CSV: "FALSE"
      DQD_CSV_FILE: ""
      DQD_CHECK_LEVELS: "TABLE,FIELD,CONCEPT"
      DQD_CHECK_NAMES: ""
      DQD_COHORT_DEFINITION_ID: ""
      DQD_COHORT_DATABASE_SCHEMA: "demo_cdm_results"
      DQD_COHORT_TABLE_NAME: "cohort"
      DQD_TABLES_TO_EXCLUDE: "CONCEPT,VOCABULARY,CONCEPT_ANCESTOR,CONCEPT_RELATIONSHIP,CONCEPT_CLASS,CONCEPT_SYNONYM,RELATIONSHIP,DOMAIN"
      DQD_TABLE_CHECK_THRESHOLD_LOC: "default"
      DQD_FIELD_CHECK_THRESHOLD_LOC: "default"
      DQD_CONCEPT_CHECK_THRESHOLD_LOC: "default"
    entrypoint: ["Rscript", "/postprocessing/dqd/scripts/run_dqd.R" ]
    volumes:
      - jdbc-drivers-data:/jdbc
      - cdm-postprocessing-data:/postprocessing
      - ./dqd/postprocessing/init.R:/postprocessing/init.R
      - ./dqd/run_dqd.R:/postprocessing/dqd/scripts/run_dqd.R
    profiles:
      - manual

  atlasdb:
    image: ohdsi/broadsea-atlasdb:2.3.0
    container_name: atlasdb
    platform: linux/amd64
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: mypass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - atlasdb-data:/var/lib/postgresql/data
    profiles:
      - manual

  atlasdb-init:
    image: postgres:15
    container_name: atlasdb-init
    platform: linux/amd64
    depends_on:
      atlasdb:
        condition: service_healthy
    environment:
      PGPASSWORD: mypass
    volumes:
      - ./atlas/100_populate_source_source_daimon.sql:/seed.sql:ro
    command: ["psql", "-h", "atlasdb", "-U", "postgres", "-d", "postgres", "-f", "/seed.sql"]
    profiles:
      - manual

  atlas-webapi:
    image: ohdsi/webapi:2.15.0
    container_name: atlas-webapi
    platform: linux/amd64
    restart: unless-stopped
    depends_on:
      atlasdb:
        condition: service_healthy
      atlasdb-init:
        condition: service_completed_successfully
      omop-db:
        condition: service_started
      achilles:
        condition: service_completed_successfully
    environment:
      DATASOURCE_DRIVERCLASSNAME: org.postgresql.Driver
      DATASOURCE_URL: jdbc:postgresql://atlasdb:5432/postgres
      DATASOURCE_USERNAME: postgres
      DATASOURCE_PASSWORD: mypass
      DATASOURCE_OHDSI_SCHEMA: webapi
      SPRING_BATCH_REPOSITORY_TABLEPREFIX: webapi.BATCH_
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      SPRING_JPA_PROPERTIES_HIBERNATE_DEFAULT_SCHEMA: webapi
      FLYWAY_DATASOURCE_DRIVERCLASSNAME: org.postgresql.Driver
      FLYWAY_DATASOURCE_URL: jdbc:postgresql://atlasdb:5432/postgres
      FLYWAY_DATASOURCE_USERNAME: postgres
      FLYWAY_DATASOURCE_PASSWORD: mypass
      FLYWAY_LOCATIONS: classpath:db/migration/postgresql
      FLYWAY_PLACEHOLDERS_OHDSISCHEMA: webapi
      FLYWAY_SCHEMAS: webapi
      FLYWAY_TABLE: schema_history
      FLYWAY_BASELINE_ON_MIGRATE: "true"
      FLYWAY_BASELINEDESCRIPTION: "Base Migration"
      flyway_baselineVersionAsString: "2.2.5.20180212152023"
      SECURITY_PROVIDER: DisabledSecurity
      SECURITY_CORS_ENABLED: "true"
      SECURITY_ORIGIN: "http://localhost:8081"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/WebAPI/info > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    ports:
      - "8082:8080"
    profiles:
      - manual

  atlas-source-init:
    image: postgres:15
    container_name: atlas-source-init
    platform: linux/amd64
    depends_on:
      atlas-webapi:
        condition: service_healthy
    environment:
      PGPASSWORD: mypass
    volumes:
      - ./atlas/register-source.sql:/seed.sql:ro
    entrypoint: ["bash", "-c"]
    command:
      - |
        set -e
        psql -h atlasdb -U postgres -d postgres -f /seed.sql
        # Force WebAPI to reload its source cache so the new source is visible
        # without restarting webapi. Uses bash /dev/tcp builtin so we don't
        # need curl/wget (not in the postgres image).
        exec 3<>/dev/tcp/atlas-webapi/8080
        printf 'GET /WebAPI/source/refresh HTTP/1.0\r\nHost: atlas-webapi\r\n\r\n' >&3
        head -1 <&3
        exec 3<&-
        echo "Source registered and WebAPI refreshed."
    profiles:
      - manual

  atlas:
    image: ohdsi/atlas:2.15.0
    container_name: atlas
    platform: linux/amd64
    restart: unless-stopped
    depends_on:
      atlas-webapi:
        condition: service_healthy
      atlas-source-init:
        condition: service_completed_successfully
    environment:
      WEBAPI_URL: "http://localhost:8082/WebAPI/"
      ATLAS_INSTANCE_NAME: "OpenMRS OMOP"
    volumes:
      - ./atlas/config-local-template.js:/tmp/config-local.js:ro
      - ./atlas/envsubst.sh:/tmp/envsubst.sh:ro
    entrypoint: ["sh", "/tmp/envsubst.sh"]
    ports:
      - "8081:8080"
    profiles:
      - manual



volumes:
  db-data: ~
  db-data2: ~
  postgres_data: ~
  jdbc-drivers-data: ~
  cdm-postprocessing-data: ~
  atlasdb-data: ~
